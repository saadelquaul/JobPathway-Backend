services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: jobpathway-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobpathway
      POSTGRES_USER: jobpathway
      POSTGRES_PASSWORD: jobpathway
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobpathway -d jobpathway"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Spring Boot Application
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobpathway-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: jobpathway
      DB_USERNAME: jobpathway
      DB_PASSWORD: jobpathway
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app_uploads:/app/uploads

volumes:
  postgres_data:
  app_uploads:
